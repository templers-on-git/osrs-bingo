<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templars Bingo Website — Log In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="name-screen">
    <div class="name-card">
      <div class="logo">⚔️</div>
      <h1>Templars Bingo Website</h1>
      <p>Log in with your clan's password</p>
      <input type="text" id="ign-input" class="card-input" placeholder="Your RuneScape name" maxlength="12" autocomplete="off">
      <input type="password" id="password-input" class="card-input" placeholder="Clan password" autocomplete="off">
      <button id="login-btn" class="card-btn">Log In</button>
      <p id="login-error" class="error-text hidden"></p>
    </div>
  </div>

  <!-- Logged-in screen: board (View), plus a board-editing screen (Edit) for Admins only -->
  <div id="loggedin-screen" class="hidden">
    <header>
      <h1>⚔️ Templars Bingo Website</h1>
      <span class="event-clan-display" id="event-clan-display"></span>
      <div id="admin-tabs" class="header-right hidden">
        <button class="btn-ghost" id="view-tab-btn">View</button>
        <button class="btn-ghost" id="edit-tab-btn">Edit</button>
      </div>
      <div class="header-right">
        <span class="playing-as">Playing as <strong id="ign-display"></strong> (<span id="role-display"></span>)</span>
        <button class="btn-ghost" id="logout-btn">Log out</button>
      </div>
    </header>
    <main>
      <!-- View: same rendering for Players and Admins -->
      <div id="view-pane">
        <div id="board-grid"></div>
      </div>

      <!-- Edit: Admin-only board management -->
      <div id="edit-pane" class="hidden">
        <section class="dev-section">
          <h2>Point Brackets</h2>
          <div class="dev-form">
            <input id="bracket-label-input" placeholder="Bracket label (e.g. Hard)" autocomplete="off">
            <input id="bracket-points-input" type="number" min="1" placeholder="Points">
            <button id="create-bracket-btn">Add Bracket</button>
          </div>
          <ul id="brackets-list" class="dev-list"></ul>
        </section>

        <section class="dev-section">
          <h2>Add Tile</h2>
          <div class="dev-form">
            <input id="tile-name-input" placeholder="Tile name" autocomplete="off">
            <select id="tile-bracket-select"></select>
            <select id="tile-type-select">
              <option value="complete_once">Complete Once</option>
              <option value="complete_x_times">Complete X Times</option>
            </select>
            <input id="tile-target-input" type="number" min="1" placeholder="Target count" class="hidden">
            <button id="create-tile-btn">Add Tile</button>
          </div>
          <p id="no-brackets-note" class="dev-muted hidden">Create a point bracket above before adding tiles.</p>
        </section>

        <section class="dev-section">
          <h2>Board Tiles</h2>
          <div id="edit-tiles-list"></div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
